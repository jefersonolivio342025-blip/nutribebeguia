<script>
  document.addEventListener("click", function(e){

    var el = e.target;

    while (el && el !== document) {

      if (el.tagName === "A") {

        var href = el.getAttribute("href") || "";

        if (href.includes("kiwify") || href.includes("hotmart")) {

          e.preventDefault();

          setTimeout(function(){
            window.location.href = href;
          }, 300);

          return;
        }
      }

      el = el.parentNode;
    }

  });
</script>
