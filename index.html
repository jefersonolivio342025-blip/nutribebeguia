    <title>NutriBebê - Guia de Introdução Alimentar Segura para Bebês</title>
    <meta
      name="description"
      content="Descubra o método validado por nutricionistas que ensina os cortes corretos e texturas seguras para o seu bebê. 50 receitas nutritivas e lista de alimentos proibidos."
    />

    <script>
      (function() {
        // SUAS CHAVES DO DASHBOARD NUTRIBEBÊ PRO
        const SB_URL = "https://jdpycowlojjccbqmoaxj.supabase.co";
        const SB_KEY = "sb_publishable_1m1xv0ewxsSwRaaCztCPLQ_JZzd5nnu";

        const getUTM = () => {
          const params = new URLSearchParams(window.location.search);
          return params.get('utm_source') || localStorage.getItem('utm_source') || 'Direto';
        };

        // Função para enviar os dados para a tabela leads_tracking
        async function trackNutri(type) {
          try {
            const utm = getUTM();
            if (utm !== 'Direto') localStorage.setItem('utm_source', utm);

            await fetch(`${SB_URL}/rest/v1/leads_tracking`, {
              method: 'POST',
              headers: {
                'apikey': SB_KEY,
                'Authorization': `Bearer ${SB_KEY}`,
                'Content-Type': 'application/json',
                'Prefer': 'return=minimal'
              },
              body: JSON.stringify({
                event_type: type,
                utm_source: utm
              })
            });
          } catch (e) {
            console.error('Erro NutriBebê Tracker:', e);
          }
        }

        // 1. Rastreia VISITA ao carregar
        window.addEventListener('load', () => {
          trackNutri('visita');
        });

        // 2. Rastreia CLIQUE em botões de checkout
        document.addEventListener('click', (e) => {
          const target = e.target.closest('a') || e.target.closest('button');
          if (target) {
            trackNutri('clique');

            // Injeta UTM no link se for Kiwify ou Hotmart
            const href = target.href || "";
            if (href.includes('kiwify') || href.includes('hotmart')) {
              const url = new URL(href);
              url.searchParams.set('utm_source', getUTM());
              target.href = url.toString();
            }
          }
        });
      })();
    </script>
