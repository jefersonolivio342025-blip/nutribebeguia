<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
    <meta name="theme-color" content="#556B2F" />
    <link rel="icon" href="/favicon.ico" />

    <title>NutriBebê - Guia de Introdução Alimentar Segura para Bebês</title>
    <meta
      name="description"
      content="Descubra o método validado por nutricionistas que ensina os cortes corretos e texturas seguras para o seu bebê. 50 receitas nutritivas e lista de alimentos proibidos."
    />

    <style>
      #nutri-toast {
        display: none; position: fixed; bottom: 20px; left: 20px;
        background: white; padding: 12px 18px; border-radius: 16px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.1); border: 1px solid #f0f0f0;
        z-index: 9999; font-family: sans-serif; align-items: center; gap: 10px;
      }
      .dot-online { width: 8px; height: 8px; background: #10b981; border-radius: 50%; }
      @keyframes pulse-green {
        0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
        70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(16, 185, 129, 0); }
        100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
      }
      .animate-pulse-green { animation: pulse-green 2s infinite; }
    </style>

    <script>
      (function() {
        const SB_URL = "https://jdpycowlojjccbqmoaxj.supabase.co";
        const SB_KEY = "sb_publishable_1m1xv0ewxsSwRaaCztCPLQ_JZzd5nnu";

        const getParams = () => {
          const params = new URLSearchParams(window.location.search);
          return {
            source: params.get('utm_source') || localStorage.getItem('utm_source') || 'Direto',
            content: params.get('utm_content') || localStorage.getItem('utm_content') || '',
            campaign: params.get('utm_campaign') || localStorage.getItem('utm_campaign') || ''
          };
        };

        async function trackNutri(type, metadata = {}) {
          try {
            const p = getParams();
            if (p.source !== 'Direto') localStorage.setItem('utm_source', p.source);
            if (p.content) localStorage.setItem('utm_content', p.content);

            await fetch(`${SB_URL}/rest/v1/leads_tracking`, {
              method: 'POST',
              headers: {
                'apikey': SB_KEY,
                'Authorization': `Bearer ${SB_KEY}`,
                'Content-Type': 'application/json',
                'Prefer': 'return=minimal'
              },
              body: JSON.stringify({
                event_type: type,
                utm_source: p.source,
                utm_content: p.content,
                utm_campaign: p.campaign,
                metadata: metadata
              })
            });
          } catch (e) { console.error('Erro NutriBebê Tracker:', e); }
        }

        // --- FUNÇÃO TESTE A/B DE HEADLINES ---
        async function runABTest() {
          const headlines = [
            "Livre-se do medo do engasgo e garanta a segurança do seu bebê.",
            "Prepare receitas saudáveis para o seu bebê em menos de 15 minutos.",
            "O guia definitivo para uma introdução alimentar sem estresse."
          ];
          const selected = headlines[Math.floor(Math.random() * headlines.length)];

          // Espera o DOM carregar para trocar o H1
          const interval = setInterval(() => {
            const h1 = document.querySelector('h1');
            if (h1) {
              h1.innerText = selected;
              clearInterval(interval);
            }
          }, 100);

          trackNutri('view_headline', { texto: selected });
        }

        // --- FUNÇÃO WIDGET DE ESCASSEZ ---
        async function runEscassez() {
          const fifteenMins = new Date(Date.now() - 15 * 60000).toISOString();
          try {
            const res = await fetch(`${SB_URL}/rest/v1/leads_tracking?event_type=eq.visita&created_at=gte.${fifteenMins}&select=count`, {
              headers: { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}` }
            });
            const data = await res.json();
            const count = (data[0]?.count || 0) + 3;

            if (count > 2) {
              const toast = document.getElementById('nutri-toast');
              document.getElementById('online-count').innerText = count;
              toast.style.display = 'flex';
              setTimeout(() => { toast.style.display = 'none'; }, 8000);
            }
          } catch (e) {}
        }

        window.addEventListener('load', () => {
          trackNutri('visita');
          runABTest();
          setTimeout(runEscassez, 3000);
        });

        document.addEventListener('click', (e) => {
          const target = e.target.closest('a') || e.target.closest('button');
          if (target) {
            trackNutri('clique');
            const p = getParams();
            const href = target.href || "";
            if (href.includes('kiwify') || href.includes('hotmart')) {
              const url = new URL(href);
              url.searchParams.set('utm_source', p.source);
              url.searchParams.set('utm_content', p.content);
              target.href = url.toString();
            }
          }
        });
      })();
    </script>

    <script>
      !function(f,b,e,v,n,t,s)
      {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
      n.callMethod.apply(n,arguments):n.queue.push(arguments)};
      if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
      n.queue=[];t=b.createElement(e);t.async=!0;
      t.src=v;s=b.getElementsByTagName(e)[0];
      s.parentNode.insertBefore(t,s)}(window, document,'script',
      'https://connect.facebook.net/en_US/fbevents.js');
      fbq('init', '3077997939046690');
      fbq('track', 'PageView');
    </script>
  </head>

  <body>
    <div id="nutri-toast">
      <div class="dot-online animate-pulse-green"></div>
      <span style="font-size: 13px; font-weight: bold; color: #334155;">
        <span id="online-count"></span> mães lendo agora
      </span>
    </div>

    <noscript>
      <img
        height="1"
        width="1"
        style="display:none"
        src="https://www.facebook.com/tr?id=3077997939046690&ev=PageView&noscript=1"
      />
    </noscript>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
