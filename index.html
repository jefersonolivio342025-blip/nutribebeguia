    <script>
      (function() {
        const SB_URL = "https://jdpycowlojjccbqmoaxj.supabase.co";
        const SB_KEY = "sb_publishable_1m1xv0ewxsSwRaaCztCPLQ_JZzd5nnu";
        async function trackNutri(type, metadata = {}) {
          if (window.location.hostname.includes("lovable.app")) return;
          try {
            const params = new URLSearchParams(window.location.search);
            await fetch(`${SB_URL}/rest/v1/leads_tracking`, {
              method: 'POST',
              headers: {
                'apikey': SB_KEY,
                'Authorization': `Bearer ${SB_KEY}`,
                'Content-Type': 'application/json',
                'Prefer': 'return=minimal'
              },
              body: JSON.stringify({
                event_type: type,
                utm_source: params.get('utm_source') || 'Direto',
                utm_campaign: params.get('utm_campaign') || '',
                metadata: { ...metadata, path: window.location.pathname }
              })
            });
          } catch (e) { console.warn('Erro no rastreio:', e); }
        }
        window.addEventListener('load', () => trackNutri('visita'));
        document.addEventListener('click', async (e) => {
          const target = e.target.closest('a');
          if (target && target.href.includes('kiwify')) {
            if (typeof fbq === 'function') fbq('track', 'InitiateCheckout');
            await trackNutri('clique', { destino: 'checkout' });
          }
        });
      })();
    </script>
