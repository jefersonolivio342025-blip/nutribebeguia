<script>
  (function() {
    const SB_URL = "https://jdpycowlojjccbqmoaxj.supabase.co";
    const SB_KEY = "sb_publishable_1m1xv0ewxsSwRaaCztCPLQ_JZzd5nnu";

    // 1. CAPTURA DE PARÂMETROS (UTMs)
    window.getParams = function() {
      const params = new URLSearchParams(window.location.search);
      return {
        source: params.get('utm_source') || localStorage.getItem('utm_source') || 'Direto',
        content: params.get('utm_content') || localStorage.getItem('utm_content') || '',
        campaign: params.get('utm_campaign') || localStorage.getItem('utm_campaign') || ''
      };
    };

    // 2. FUNÇÃO DE ENVIO PARA O SUPABASE
    window.trackNutri = async function(type, metadata = {}) {
      try {
        const p = getParams();
        // Salva na memória para não perder o rastro se ela navegar no site
        if (p.source !== 'Direto') localStorage.setItem('utm_source', p.source);
        if (p.content) localStorage.setItem('utm_content', p.content);

        await fetch(`${SB_URL}/rest/v1/leads_tracking`, {
          method: 'POST',
          headers: {
            'apikey': SB_KEY,
            'Authorization': `Bearer ${SB_KEY}`,
            'Content-Type': 'application/json',
            'Prefer': 'return=minimal'
          },
          body: JSON.stringify({
            event_type: type,
            utm_source: p.source,
            utm_content: p.content,
            utm_campaign: p.campaign,
            metadata: metadata
          })
        });
      } catch (e) { console.error('Erro Tracker:', e); }
    };

    // 3. MONITORAMENTO DE CLIQUES (PIXEL DE CONVERSÃO)
    document.addEventListener("click", function(e) {
      var el = e.target.closest("a");
      if (!el) return;

      var href = el.getAttribute("href") || "";

      // Verifica se é link da Kiwify ou Hotmart
      if (href.indexOf("kiwify") !== -1 || href.indexOf("hotmart") !== -1) {

        // Bloqueia a saída rápida para garantir o disparo dos pixels
        e.preventDefault();

        // Dispara Facebook InitiateCheckout
        if (typeof fbq === "function") {
          fbq('track', 'InitiateCheckout');
        }

        // Registra o clique no seu Dashboard
        trackNutri('clique', { destino: 'checkout_index' });

        // Adiciona as UTMs no link de pagamento
        var p = getParams();
        var finalUrl = href;
        try {
          var url = new URL(href);
          url.searchParams.set('utm_source', p.source);
          url.searchParams.set('utm_content', p.content);
          finalUrl = url.toString();
        } catch(err) {}

        // Redireciona após 400ms
        setTimeout(function() {
          window.location.href = finalUrl;
        }, 400);
      }
    });

    // Registra a visita ao carregar a página
    window.addEventListener('load', function() {
      trackNutri('visita');
    });
  })();
</script>
