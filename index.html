<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NutriBebê PRO - Tracking</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      @keyframes custom-ping {
          0% { transform: scale(1); opacity: 1; }
          75%, 100% { transform: scale(2); opacity: 0; }
      }
      .animate-custom-ping { animation: custom-ping 1s cubic-bezier(0, 0, 0.2, 1) infinite; }
    </style>
  </head>
  <body class="bg-[#FDFCFB] min-h-screen flex items-center justify-center p-10 text-center font-sans">
    <div class="max-w-md">
      <h1 class="text-3xl font-black uppercase italic text-slate-800 tracking-tighter">
        NutriBebê <span class="text-orange-500">PRO</span>
      </h1>
      <p class="text-slate-500 mt-4 font-medium">
        O sistema de rastreamento está monitorando cliques e UTMs em tempo real.
      </p>

      <div class="mt-10 p-8 bg-white rounded-[32px] border border-slate-100 shadow-xl shadow-orange-500/5">
        <div class="w-12 h-12 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-4">
          <div class="w-3 h-3 bg-green-500 rounded-full animate-custom-ping"></div>
        </div>
        <p class="text-xs font-bold text-slate-400 uppercase tracking-widest">Status da Conexão</p>
        <p class="text-sm text-slate-700 mt-2 leading-relaxed">
          As políticas de acesso (RLS) foram atualizadas. Os cliques agora são enviados para a tabela
          <code class="bg-slate-100 px-1 rounded text-orange-600">leads_tracking</code>.
        </p>
      </div>

      <p class="text-[10px] text-slate-400 mt-8 uppercase font-bold tracking-widest">ID da Tabela: leads_tracking</p>
    </div>

    <script>
      (function() {
          const SB_URL = "https://jdpycowlojjccbqmoaxj.supabase.co/rest/v1/leads_tracking";
          const SB_KEY = "sb_publishable_1m1xv0ewxsSwRaaCztCPLQ_JZzd5nnu";

          const params = new URLSearchParams(window.location.search);
          const utm_source = params.get("utm_source") || "direto";
          const utm_campaign = params.get("utm_campaign") || "nenhuma";
          const utm_medium = params.get("utm_medium") || "organico";
          const device = /Android|iPhone|iPad/i.test(navigator.userAgent) ? "mobile" : "desktop";

          async function trackEvent(val, extraData = {}) {
              try {
                  const payload = {
                      event_type: val,
                      utm_source: utm_source,
                      utm_campaign: utm_campaign,
                      utm_medium: utm_medium,
                      click_x: extraData.click_x !== undefined ? Number(extraData.click_x.toFixed(2)) : null,
                      click_y: extraData.click_y !== undefined ? Number(extraData.click_y.toFixed(2)) : null,
                      metadata: JSON.stringify({
                          device: device,
                          path: window.location.pathname,
                          ...Object.fromEntries(Object.entries(extraData).filter(([k]) => k !== "click_x" && k !== "click_y")),
                      }),
                  };

                  await fetch(SB_URL, {
                      method: "POST",
                      headers: {
                          "Content-Type": "application/json",
                          "apikey": SB_KEY,
                          "Authorization": `Bearer ${SB_KEY}`,
                          "Prefer": "return=minimal",
                      },
                      body: JSON.stringify(payload),
                  });
                  console.log(`✅ Evento ${val} registrado.`);
              } catch (e) {
                  console.error("❌ Erro no rastreio:", e);
              }
          }

          // Inicia o rastreio
          trackEvent("visita");

          // Rastreio de cliques
          window.addEventListener("click", function(e) {
              const width = window.innerWidth;
              const height = document.documentElement.scrollHeight;
              const x = (e.pageX / width) * 100;
              const y = (e.pageY / height) * 100;

              trackEvent("clique", { click_x: x, click_y: y });
          });
      })();
    </script>
  </body>
</html>
