<script>
  (function() {

    document.addEventListener("click", function(e) {

      var el = e.target;

      while (el && el !== document) {

        if (el.tagName === "A" || el.tagName === "BUTTON") {

          var href = el.getAttribute("href") || "";

          var isCheckout =
            href.indexOf("kiwify") !== -1 ||
            href.indexOf("hotmart") !== -1 ||
            (el.classList && el.classList.contains("btn-compra"));

          if (isCheckout) {

            e.preventDefault();

            // Dashboard
            if (typeof trackNutri === "function") {
              try {
                trackNutri("clique", { destino: "checkout_externo" });
              } catch (err) {}
            }

            // Facebook Pixel
            if (typeof fbq === "function") {
              try {
                fbq("track", "InitiateCheckout");
              } catch (err) {}
            }

            var finalUrl = href;

            try {
              if (href.indexOf("http") === 0) {
                var url = document.createElement("a");
                url.href = href;

                var source = "Direto";
                var content = "";

                if (typeof getParams === "function") {
                  var p = getParams();
                  source = p.source || source;
                  content = p.content || content;
                }

                var separator = url.search ? "&" : "?";
                finalUrl = href + separator +
                  "utm_source=" + encodeURIComponent(source) +
                  "&utm_content=" + encodeURIComponent(content);
              }
            } catch (err) {}

            setTimeout(function() {
              window.location.href = finalUrl;
            }, 400);

            return;
          }
        }

        el = el.parentNode;
      }

    });

  })();
</script>
