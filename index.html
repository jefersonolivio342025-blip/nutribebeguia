<script>
  (function() {
    document.addEventListener("click", function(e) {
      // 1. Busca o link (A) mais próximo do clique
      var el = e.target.closest("a");

      // Se não for um link, não faz nada e deixa o site funcionar normal
      if (!el) return;

      var href = el.getAttribute("href") || "";

      // 2. Só intercepta se for link de pagamento (Checkout)
      if (href.indexOf("kiwify") !== -1 || href.indexOf("hotmart") !== -1) {

        // Impede a saída imediata para dar tempo ao rastreio
        e.preventDefault();

        // 3. Dispara o Facebook Pixel (se estiver instalado)
        if (typeof fbq === "function") {
          fbq('track', 'InitiateCheckout');
        }

        // 4. Registra no seu Dashboard (via função trackNutri que você já tem)
        if (typeof trackNutri === "function") {
          trackNutri('clique', { destino: 'checkout_pelo_index' });
        }

        // 5. Redireciona após um pequeno delay de segurança
        setTimeout(function() {
          window.location.href = href;
        }, 400);
      }
    });
  })();
</script>
