<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
    <link rel="icon" href="/favicon.ico" />
    <title>NutriBebê - Introdução Alimentar Segura</title>

    <script>
      !function(f,b,e,v,n,t,s){if(f.fbq)return;n=f.fbq=function(){n.callMethod?
      n.callMethod.apply(n,arguments):n.queue.push(arguments)};
      if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
      n.queue=[];t=b.createElement(e);t.async=!0;
      t.src=v;s=b.getElementsByTagName(e)[0];
      s.parentNode.insertBefore(t,s)}(window, document,'script',
      'https://connect.facebook.net/en_US/fbevents.js');
      fbq('init', '3077997939046690');
      fbq('track', 'PageView');
    </script>
  </head>
  <body>
    <noscript>
      <img
        height="1"
        width="1"
        style="display:none"
        src="https://www.facebook.com/tr?id=3077997939046690&ev=PageView&noscript=1"
      />
    </noscript>

    <div
      id="nutri-toast"
      style="display: none; position: fixed; bottom: 20px; right: 20px; background: white; padding: 12px 18px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); z-index: 9999; align-items: center; gap: 10px;"
    >
      <div style="width: 8px; height: 8px; background: #10b981; border-radius: 50%;"></div>
      <span style="font-size: 13px; font-weight: bold; color: #334155; font-family: sans-serif;">
        <span id="online-count">12</span> m&#227;es lendo agora
      </span>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <script>
      (function() {
        const SB_URL = "https://jdpycowlojjccbqmoaxj.supabase.co";
        const SB_KEY = "sb_publishable_1m1xv0ewxsSwRaaCztCPLQ_JZzd5nnu";

        async function trackNutri(type, metadata = {}) {
          if (window.location.hostname.includes("lovable.app")) return;
          try {
            const params = new URLSearchParams(window.location.search);
            await fetch(`${SB_URL}/rest/v1/leads_tracking`, {
              method: 'POST',
              headers: {
                'apikey': SB_KEY,
                'Authorization': `Bearer ${SB_KEY}`,
                'Content-Type': 'application/json',
                'Prefer': 'return=minimal'
              },
              body: JSON.stringify({
                event_type: type,
                utm_source: params.get('utm_source') || 'Direto',
                utm_campaign: params.get('utm_campaign') || '',
                metadata: { ...metadata, path: window.location.pathname }
              })
            });
          } catch (e) { console.warn('Erro no rastreio:', e); }
        }

        // Registrar visita ao carregar
        window.addEventListener('load', () => {
          trackNutri('visita');
          var toast = document.getElementById('nutri-toast');
          toast.style.display = 'flex';
          var countEl = document.getElementById('online-count');
          setInterval(function() {
            var current = parseInt(countEl.textContent, 10);
            var change = Math.random() < 0.5 ? -1 : 1;
            var next = Math.min(25, Math.max(5, current + change));
            countEl.textContent = next;
          }, 4000);
        });

        // Registrar clique no botão de compra (Checkout)
        document.addEventListener('click', async (e) => {
          const target = e.target.closest('a');
          if (target && (target.href.includes('kiwify') || target.href.includes('hotmart'))) {
            e.preventDefault();

            // Dispara InitiateCheckout no Facebook
            if (typeof fbq === 'function') fbq('track', 'InitiateCheckout');

            // Salva no seu Dashboard
            await trackNutri('clique', { destino: 'checkout' });

            // Redireciona para a Kiwify
            window.location.href = target.href;
          }
        });
      })();
    </script>
  </body>
</html>
